<div class="d-flex">

  <aside class="sidebar p-4 text-light d-flex flex-column">

    <div class="d-flex align-items-center gap-3 mb-5 px-2">
      <div class="sidebar-logo">
        <i class="bi bi-person-circle fs-4"></i>
      </div>
      <div>
        <h4 class="fw-bold mb-0">StyloStore</h4>
        <small class="text-white-50">Mi Cuenta</small>
      </div>
    </div>

    <ul class="list-unstyled d-flex flex-column gap-1 flex-grow-1">

      <li>
        <a routerLink="/cliente/perfil" routerLinkActive="sidebar-active" [routerLinkActiveOptions]="{exact: true}" class="sidebar-link">
          <i class="bi bi-person"></i>
          <span>Perfil</span>
        </a>
      </li>

      <li>
        <a routerLink="/cliente/carrito" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="bi bi-bag"></i>
          <span>Carrito</span>
        </a>
      </li>

      <li>
        <a routerLink="/cliente/historial" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="bi bi-clock-history"></i>
          <span>Historial</span>
        </a>
      </li>

    </ul>

    <div class="pt-4 border-top border-light border-opacity-10">
      <button class="btn btn-outline-light btn-sm w-100 rounded-pill" (click)="logout()">
        <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
      </button>
    </div>

  </aside>

  <main class="flex-grow-1 p-5">
    <router-outlet></router-outlet>
  </main>

</div>
