<div class="d-flex">

  <app-sidebar></app-sidebar>

  <div class="flex-grow-1 p-5">

    <div class="d-flex justify-content-between mb-4">

      <h1 class="fw-bold">
        Categorías
      </h1>

      <button class="btn btn-dark rounded-pill px-4" (click)="abrirModal()">
        Nueva categoría
      </button>

    </div>

    <div class="bg-white p-4 rounded-4 shadow-sm">

      <table class="table align-middle">

        <thead>

          <tr>

            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>

          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let categoria of categorias">

            <td>{{ categoria.idCategoria }}</td>

            <td>{{ categoria.nombre }}</td>

            <td>{{ categoria.descripcion }}</td>

            <td class="d-flex gap-2">

              <button class="btn btn-warning btn-sm" (click)="abrirModal(categoria)">
                Editar
              </button>

              <button class="btn btn-danger btn-sm" (click)="eliminarCategoria(categoria.idCategoria)">
                Eliminar
              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="categoriaModal" tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          {{ categoriaSeleccionada.idCategoria ? 'Editar Categoría' : 'Nueva Categoría' }}
        </h5>

        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

      </div>

      <div class="modal-body">

        <div class="mb-3">

          <label class="form-label fw-semibold">
            Nombre
          </label>

          <input type="text" class="form-control" [(ngModel)]="categoriaSeleccionada.nombre">

        </div>

        <div class="mb-3">

          <label class="form-label fw-semibold">
            Descripción
          </label>

          <textarea class="form-control" rows="3" [(ngModel)]="categoriaSeleccionada.descripcion" style="resize: none;"></textarea>

        </div>

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>

        <button class="btn btn-dark" (click)="guardarCategoria()">
          Guardar
        </button>

      </div>

    </div>

  </div>

</div>
