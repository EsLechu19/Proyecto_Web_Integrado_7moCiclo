<div
  class="offcanvas offcanvas-end"
  tabindex="-1"
  id="loginSidebar"
>

  <div class="offcanvas-header login-header">

    <div>
      <div class="login-icon-circle">
        <i class="bi bi-person-lock"></i>
      </div>
      <h4 class="fw-bold mb-1 text-white">
        Iniciar Sesión
      </h4>
      <p class="text-white-50 small mb-0">Ingresa tus credenciales para continuar</p>
    </div>

    <button
      type="button"
      class="btn-close btn-close-white"
      data-bs-dismiss="offcanvas"
    ></button>

  </div>

  <div class="offcanvas-body d-flex flex-column">

    <form (ngSubmit)="iniciarSesion()" class="flex-grow-1 d-flex flex-column">

      <div class="mb-4">
        <label class="form-label small fw-semibold text-uppercase tracking">Correo electrónico</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-envelope input-icon"></i>
          <input
            type="email"
            class="form-control login-input"
            placeholder="tu@correo.com"
            [(ngModel)]="correo"
            name="correo"
          >
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold text-uppercase tracking">Contraseña</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input
            type="password"
            class="form-control login-input"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
          >
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-login w-100 py-3 fw-bold mt-2"
        [disabled]="cargando"
      >
        <span *ngIf="!cargando">Iniciar Sesión</span>
        <span *ngIf="cargando">
          <span class="spinner-border spinner-border-sm me-2"></span>
          Ingresando...
        </span>
      </button>

    </form>

    <div class="text-center mt-auto pt-4 border-top">
      <p class="small text-muted mb-2">¿No tienes cuenta?</p>
      <button
        class="btn btn-outline-dark rounded-pill px-5 w-100"
        (click)="switchToRegister()"
      >
        Crear cuenta
      </button>
    </div>

  </div>

</div>
