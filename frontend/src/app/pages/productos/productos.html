<section class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h1 class="fw-bold mb-1">
        {{ tituloCatalogo }}
      </h1>
      <p class="text-muted mb-0">
        {{ filtroGenero || filtroCategoria ? 'Productos filtrados según tu selección' : 'Descubre nuestra colección completa' }}
      </p>
    </div>
    <button class="btn btn-dark rounded-pill px-4 d-lg-none" data-bs-toggle="offcanvas" data-bs-target="#filterOffcanvas">
      <i class="bi bi-funnel me-2"></i>Filtros
    </button>
  </div>

  <!-- FILTER OFF CANVAS (mobile) -->
  <div class="offcanvas offcanvas-start d-lg-none" tabindex="-1" id="filterOffcanvas">
    <div class="offcanvas-header filter-header">
      <h5 class="fw-bold mb-0"><i class="bi bi-funnel me-2"></i>Filtros</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <ng-container *ngTemplateOutlet="filterContent"></ng-container>
    </div>
  </div>

  <ng-template #filterContent>
    <div class="p-4">

      <div class="search-wrapper mb-4">
        <i class="bi bi-search search-icon"></i>
        <input
          class="form-control search-input rounded-pill"
          placeholder="Buscar productos..."
          [(ngModel)]="busqueda"
          (keyup.enter)="aplicarFiltros()"
        >
      </div>

      <div class="filter-divider mb-4"></div>

      <h6 class="filter-label mb-3">
        <i class="bi bi-people"></i>
        Género
      </h6>

      <div class="d-flex flex-wrap gap-2 mb-4">

        <button
          class="filter-btn"
          [class.active]="filtroGenero === ''"
          (click)="filtroGenero = ''; aplicarFiltros()"
        >
          <i class="bi bi-grid-3x3-gap"></i>
          Todos
        </button>

        <button
          class="filter-btn"
          [class.active]="filtroGenero === 'HOMBRE'"
          (click)="filtroGenero = 'HOMBRE'; aplicarFiltros()"
        >
          <i class="bi bi-gender-male"></i>
          Hombre
        </button>

        <button
          class="filter-btn"
          [class.active]="filtroGenero === 'MUJER'"
          (click)="filtroGenero = 'MUJER'; aplicarFiltros()"
        >
          <i class="bi bi-gender-female"></i>
          Mujer
        </button>

        <button
          class="filter-btn"
          [class.active]="filtroGenero === 'UNISEX'"
          (click)="filtroGenero = 'UNISEX'; aplicarFiltros()"
        >
          <i class="bi bi-gender-ambiguous"></i>
          Unisex
        </button>

      </div>

      <div class="filter-divider mb-4"></div>

      <h6 class="filter-label mb-3">
        <i class="bi bi-tags"></i>
        Categoría
      </h6>

      <div class="d-flex flex-wrap gap-2 mb-3">

        <button
          class="filter-btn"
          [class.active]="filtroCategoria === ''"
          (click)="filtroCategoria = ''; aplicarFiltros()"
        >
          <i class="bi bi-collection"></i>
          Todas
        </button>

        <button
          *ngFor="let cat of categorias"
          class="filter-btn"
          [class.active]="filtroCategoria === String(cat.idCategoria)"
          (click)="filtroCategoria = String(cat.idCategoria); aplicarFiltros()"
        >
          <i class="bi bi-bookmark"></i>
          {{ cat.nombre }}
        </button>

      </div>

      <div class="filter-divider my-4"></div>

      <button
        class="btn-limpiar"
        (click)="filtroGenero = ''; filtroCategoria = ''; busqueda = ''; aplicarFiltros()"
      >
        <i class="bi bi-arrow-counterclockwise"></i>
        Limpiar filtros
      </button>

    </div>
  </ng-template>

  <div class="row">

    <div class="col-lg-3 mb-4 d-none d-lg-block">

      <div class="card border-0 shadow filter-sidebar">

        <div class="filter-header">
          <i class="bi bi-funnel me-2"></i>
          Filtros
        </div>

        <div class="filter-scroll">
          <ng-container *ngTemplateOutlet="filterContent"></ng-container>
        </div>

      </div>

    </div>

    <div class="col-lg-9">

      <app-spinner *ngIf="cargando" texto="Cargando productos..."></app-spinner>

      <div
        *ngIf="!cargando && productos.length === 0"
        class="text-center py-5"
      >
        <i class="bi bi-box-seam fs-1 text-muted"></i>
        <p class="mt-3 text-muted">No se encontraron productos</p>
      </div>

      <div
        class="row g-4"
        *ngIf="!cargando && productos.length > 0"
      >

        <div
          class="col-md-6 col-lg-4"
          *ngFor="let producto of productosPagina"
        >

          <app-product-card
            [producto]="producto"
          >
          </app-product-card>

        </div>

      </div>

      <app-paginator
        [paginaActual]="paginaActual"
        [totalPaginas]="totalPaginas"
        (cambioPagina)="cambiarPagina($event)"
      ></app-paginator>

    </div>

  </div>

</section>
