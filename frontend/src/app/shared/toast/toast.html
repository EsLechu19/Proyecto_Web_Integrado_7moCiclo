<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
  <div *ngFor="let toast of toasts" class="toast show align-items-center border-0 {{ claseTipo(toast.tipo) }} mb-2" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        {{ toast.mensaje }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="remover(toast.id)"></button>
    </div>
  </div>
</div>
