<div class="card border-0 shadow-sm rounded-4 h-100 product-card">

  <!-- IMAGEN -->
  <div class="position-relative">
    <img
      [src]="producto.imagenUrl"
      class="card-img-top rounded-top-4"
      [alt]="producto.nombre"
      style="height: 280px; object-fit: cover;"
    >
    <span class="badge bg-dark position-absolute top-0 start-0 m-2 rounded-pill px-3 py-1">
      {{ producto.categoria?.nombre }}
    </span>
  </div>

  <div class="card-body d-flex flex-column">

    <h5 class="fw-bold mb-1">{{ producto.nombre }}</h5>

    <p class="text-primary fw-bold fs-5 mb-2">S/. {{ producto.precio?.toFixed(2) }}</p>

    <div class="d-flex align-items-center gap-2 mb-2">
      <small class="text-muted"><i class="bi bi-palette me-1"></i>{{ producto.color }}</small>
    </div>

    <!-- TALLAS -->
    <div class="mb-3" *ngIf="producto.tallas && producto.tallas.length > 0">
      <div class="d-flex flex-wrap gap-1">
        <span
          *ngFor="let t of producto.tallas.slice(0, 4)"
          class="badge border"
          [class.bg-light]="true"
          [class.text-dark]="true"
          [class.border-secondary]="t.stock > 0"
          [class.text-muted]="t.stock <= 0"
          [class.opacity-50]="t.stock <= 0"
        >
          {{ t.talla }}
        </span>
        <span *ngIf="producto.tallas.length > 4" class="badge bg-light text-muted border">+{{ producto.tallas.length - 4 }}</span>
      </div>
    </div>
    <div *ngIf="!producto.tallas || producto.tallas.length === 0">
      <small class="text-muted">Talla: Única</small>
    </div>

    <div class="mt-auto d-flex justify-content-between align-items-center gap-2">
      <small class="text-muted" *ngIf="stockTotal(producto) > 0">
        <i class="bi bi-box me-1"></i>{{ stockTotal(producto) }} und.
      </small>
      <small class="text-danger" *ngIf="stockTotal(producto) <= 0">Sin stock</small>
      <a
        [routerLink]="['/productos', producto.idProducto]"
        [queryParamsHandling]="'preserve'"
        class="btn btn-dark rounded-pill px-4 py-1 small fw-bold"
        [class.disabled]="stockTotal(producto) <= 0"
      >
        Ver
      </a>

    </div>

  </div>

</div>
