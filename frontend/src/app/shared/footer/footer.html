<footer class="footer-section text-light py-4">

  <div class="container">

    <div class="row g-4">

      <div class="col-lg-4">

        <h3 class="fw-bold mb-3">
          StyloStore
        </h3>

        <p>
          Moda moderna y elegante para todas las temporadas.
        </p>

      </div>

      <div class="col-lg-4">

        <h5 class="fw-bold mb-3">
          Categorías
        </h5>

        <ul class="list-unstyled">

          <li class="mb-2">

            <a
              class="text-light text-decoration-none"
              routerLink="/productos"
              [queryParams]="{genero: 'HOMBRE'}"
            >
              Hombre
            </a>

          </li>

          <li class="mb-2">

            <a
              class="text-light text-decoration-none"
              routerLink="/productos"
              [queryParams]="{genero: 'MUJER'}"
            >
              Mujer
            </a>

          </li>

          <li class="mb-2">

            <a
              class="text-light text-decoration-none"
              routerLink="/productos"
              [queryParams]="{categoria: 2}"
            >
              Zapatillas
            </a>

          </li>

          <li class="mb-2">

            <a
              class="text-light text-decoration-none"
              routerLink="/productos"
            >
              Catálogo completo
            </a>

          </li>

        </ul>

      </div>

      <div class="col-lg-4">

        <h5 class="fw-bold mb-3">
          Contacto
        </h5>

        <ul class="list-unstyled">
          <li class="mb-2">
            <i class="bi bi-geo-alt me-2"></i>Av. Principal 123, Lima
          </li>
          <li class="mb-2">
            <i class="bi bi-envelope me-2"></i>contacto@stylostore.pe
          </li>
          <li class="mb-2">
            <i class="bi bi-whatsapp me-2"></i>+51 999 888 777
          </li>
        </ul>

        <h5 class="fw-bold mb-3 mt-4">
          Síguenos
        </h5>

        <div class="d-flex gap-3 fs-3">
          <i class="bi bi-facebook"></i>
          <i class="bi bi-instagram"></i>
          <i class="bi bi-tiktok"></i>
        </div>

      </div>

    </div>

  </div>

</footer>
