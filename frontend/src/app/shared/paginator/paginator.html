<nav *ngIf="totalPaginas > 1" class="d-flex justify-content-center mt-4">
  <ul class="pagination">
    <li class="page-item" [class.disabled]="paginaActual === 1">
      <button class="page-link rounded-start-pill" (click)="irAPagina(paginaActual - 1)">&laquo;</button>
    </li>
    <li class="page-item" *ngFor="let p of paginas" [class.active]="p === paginaActual">
      <button class="page-link" (click)="irAPagina(p)">{{ p }}</button>
    </li>
    <li class="page-item" [class.disabled]="paginaActual === totalPaginas">
      <button class="page-link rounded-end-pill" (click)="irAPagina(paginaActual + 1)">&raquo;</button>
    </li>
  </ul>
</nav>
