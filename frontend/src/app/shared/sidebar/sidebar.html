<div class="sidebar p-4 text-light d-flex flex-column">

  <div class="d-flex align-items-center gap-3 mb-5 px-2">
    <div class="sidebar-logo">
      <i class="bi bi-shop fs-4"></i>
    </div>
    <div>
      <h4 class="fw-bold mb-0">StyloStore</h4>
      <small class="text-white-50">Admin Panel</small>
    </div>
  </div>

  <ul class="list-unstyled d-flex flex-column gap-1 flex-grow-1">

    <li>
      <a routerLink="/admin" routerLinkActive="sidebar-active" [routerLinkActiveOptions]="{exact: true}" class="sidebar-link">
        <i class="bi bi-grid-1x2"></i>
        <span>Dashboard</span>
      </a>
    </li>

    <li>
      <a routerLink="/admin/productosAdmin" routerLinkActive="sidebar-active" class="sidebar-link">
        <i class="bi bi-box-seam"></i>
        <span>Productos</span>
      </a>
    </li>

    <li>
      <a routerLink="/admin/categorias" routerLinkActive="sidebar-active" class="sidebar-link">
        <i class="bi bi-tags"></i>
        <span>Categorías</span>
      </a>
    </li>

    <li>
      <a routerLink="/admin/pedidos" routerLinkActive="sidebar-active" class="sidebar-link">
        <i class="bi bi-truck"></i>
        <span>Pedidos</span>
      </a>
    </li>

    <li>
      <a routerLink="/admin/usuarios" routerLinkActive="sidebar-active" class="sidebar-link">
        <i class="bi bi-people"></i>
        <span>Usuarios</span>
      </a>
    </li>

  </ul>

  <div class="pt-4 border-top border-light border-opacity-10">
    <button class="btn btn-outline-light btn-sm w-100 rounded-pill" (click)="logout()">
      <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
    </button>
  </div>

</div>
